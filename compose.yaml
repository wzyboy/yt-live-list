services:
  app:
    build:
      context: .
    image: yt-live-list:local
    restart: unless-stopped
    user: '${YTLL_UID:-1000}:${YTLL_GID:-1000}'
    ports:
      - '${YTLL_PORT:-4418}:8000'
    environment:
      YTLL_TOKEN_FILE: /run/secrets/youtube_token
      YTLL_CACHE_TTL_SECONDS: '${YTLL_CACHE_TTL_SECONDS:-60}'
      YTLL_PUBLIC_BASE_URL: '${YTLL_PUBLIC_BASE_URL:-}'
    secrets:
      - youtube_token
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

secrets:
  youtube_token:
    file: ./data/youtube-token.json
